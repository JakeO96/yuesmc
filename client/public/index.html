<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- og: -> Open Graph tags for social sharing card -->
    <meta property="og:title" content="Noctura Studio Home Page" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="nocturastudio.com" />
    <meta property="og:description" 
          content="We are Noctura Studio, a creative development studio building video games on the Algorand blockchain. A 'Web3 Company', we issue a governance crypto token in order to structure our community as a Decentralized Autonomous Organization. This enables player approved updating, helps fund the studio, and provides value to our customers. We are currently developing our flagship product: Nexxis, a battle card game where players raid against a variety of AI bosses. Ingredients gathered from successful raiding are used to create unique instances of cards, which are minted as NFTs. DAO funded tournaments provide a competitive arena for players to prove themselves and to be rewarded for their skills."
    />
    <meta property="og:url" content="nocturastudio.com/" />
    <meta
      name="description"
      content="Noctura Studio - Developers of the battle card game Nexxis"
    />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link type="text/css" href="/dist/output.css" />
    <link type="text/css" href="https://use.typekit.net/wfp1dtu.css%22%3E" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Noctura Studio</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
